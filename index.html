<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Instituto Carrión | Sistema de Firmas Presenciales</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f8;
            min-height: 100vh;
            padding: 32px 24px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Modern Header */
        .modern-header {
            background: white;
            border-radius: 28px;
            padding: 24px 32px;
            margin-bottom: 32px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03), 0 2px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(102, 126, 234, 0.12);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .icon-badge {
            width: 58px;
            height: 58px;
            background: linear-gradient(145deg, #1e2b6e, #14204f);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 18px -6px rgba(30,43,110,0.3);
        }

        .icon-badge i {
            font-size: 32px;
            color: white;
        }

        .title-section h1 {
            font-size: 1.65rem;
            font-weight: 700;
            color: #0a1e3c;
            letter-spacing: -0.3px;
        }

        .title-section p {
            color: #5b6e8c;
            font-size: 0.9rem;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .institute-badge {
            background: #eef2ff;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            color: #1e2b6e;
        }

        /* Cards Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 28px;
            margin-bottom: 32px;
        }

        @media (max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            body {
                padding: 20px 16px;
            }
        }

        /* Glassmorphic Cards */
        .glass-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(0px);
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.02);
            border: 1px solid rgba(255,255,255,0.5);
            transition: all 0.2s ease;
            overflow: hidden;
        }

        .card-header-modern {
            padding: 22px 28px 12px 28px;
            border-bottom: 1px solid #edf2f7;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-header-modern h2 {
            font-size: 1.35rem;
            font-weight: 600;
            color: #0f2b3d;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-header-modern h2 i {
            color: #2c3e8f;
            font-size: 1.4rem;
        }

        .card-body-modern {
            padding: 24px 28px 32px 28px;
        }

        /* Form Styles */
        .input-group {
            margin-bottom: 28px;
        }

        .input-label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #4a5b7a;
            margin-bottom: 8px;
        }

        .input-field {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid #e2e8f0;
            border-radius: 20px;
            font-size: 1rem;
            font-family: 'Inter', monospace;
            transition: all 0.2s;
            background: #ffffff;
        }

        .input-field:focus {
            outline: none;
            border-color: #3b4f9b;
            box-shadow: 0 0 0 4px rgba(59, 79, 155, 0.12);
        }

        /* Signature Pad Pro */
        .signature-container {
            background: #fafcff;
            border-radius: 24px;
            border: 2px solid #eef2ff;
            transition: all 0.2s;
        }

        .signature-container:focus-within {
            border-color: #3b4f9b;
            box-shadow: 0 4px 14px rgba(59, 79, 155, 0.15);
        }

        .signature-pad {
            width: 100%;
            height: 210px;
            background: white;
            border-radius: 20px;
            cursor: crosshair;
            touch-action: none;
            display: block;
        }

        .signature-hint {
            text-align: center;
            padding: 12px;
            font-size: 0.75rem;
            color: #7c8ba0;
            background: #f8fafd;
            border-radius: 0 0 20px 20px;
            border-top: 1px solid #edf2f7;
        }

        /* Buttons */
        .btn-group-modern {
            display: flex;
            gap: 14px;
            margin-top: 28px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(105deg, #1e2e6e, #243b82);
            color: white;
            box-shadow: 0 4px 10px rgba(30,46,110,0.25);
            flex: 2;
            justify-content: center;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            background: linear-gradient(105deg, #16255a, #1e3270);
            box-shadow: 0 10px 20px -5px rgba(30,46,110,0.4);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #1e293b;
            border: 1px solid #e2e8f0;
        }

        .btn-secondary:hover {
            background: #e6edf4;
            transform: translateY(-1px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #cbd5e1;
            color: #334155;
        }

        .btn-outline:hover {
            background: #f8fafc;
            border-color: #3b4f9b;
        }

        .btn-success {
            background: #0f3b2c;
            color: white;
            box-shadow: 0 2px 6px rgba(15,59,44,0.2);
        }

        .btn-success:hover {
            background: #0a2e22;
            transform: translateY(-1px);
        }

        /* Students Grid Premium */
        .students-grid-premium {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 16px;
        }

        .student-card-premium {
            background: #ffffff;
            border-radius: 24px;
            padding: 18px 20px;
            transition: all 0.2s;
            border: 1px solid #eef2ff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .student-card-premium:hover {
            border-color: #cbdffc;
            box-shadow: 0 12px 20px -12px rgba(0,0,0,0.08);
            transform: translateY(-2px);
        }

        .student-name-premium {
            font-weight: 700;
            font-size: 1.1rem;
            color: #0f2b3d;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .student-name-premium i {
            color: #2c3e8f;
            font-size: 1.2rem;
        }

        .student-date-premium {
            font-size: 0.75rem;
            color: #6c7e9e;
            margin: 8px 0 12px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .signature-preview {
            background: #f9fbfe;
            border-radius: 16px;
            padding: 8px 12px;
            margin-top: 10px;
            border: 1px solid #ecf3fa;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .signature-preview img {
            max-height: 44px;
            max-width: 140px;
            background: white;
            object-fit: contain;
        }

        .badge-firma {
            font-size: 0.7rem;
            background: #eef2ff;
            padding: 4px 10px;
            border-radius: 50px;
            color: #1e2b6e;
        }

        .toolbar-modern {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .empty-state-premium {
            text-align: center;
            padding: 48px 24px;
            background: #fafcff;
            border-radius: 32px;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #6c7e9e;
            font-size: 0.8rem;
        }

        /* Loading */
        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none !important;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<div class="container">
    <!-- Header profesional -->
    <div class="modern-header">
        <div class="logo-area">
            <div class="icon-badge">
                <i class="fas fa-tooth"></i>
            </div>
            <div class="title-section">
                <h1>Instituto Carrión</h1>
                <p><i class="fas fa-graduation-cap"></i> Solicitud de Firmas para Presenciales del Curso | <i class="fas fa-map-pin"></i> Lima - Perú</p>
            </div>
        </div>
        <div class="institute-badge">
            <i class="fas fa-check-circle"></i> Registro Oficial
        </div>
    </div>

    <!-- Grid principal -->
    <div class="dashboard-grid">
        <!-- Formulario + firma -->
        <div class="glass-card">
            <div class="card-header-modern">
                <h2><i class="fas fa-pen-fancy"></i> Nuevo registro</h2>
                <i class="fas fa-shield-alt" style="color:#a0b4d7;"></i>
            </div>
            <div class="card-body-modern">
                <form id="signatureForm">
                    <div class="input-group">
                        <label class="input-label"><i class="fas fa-user-graduate"></i> NOMBRE COMPLETO</label>
                        <input type="text" id="fullName" class="input-field" placeholder="Ej. María Fernanda Ríos López" autocomplete="off" required>
                    </div>
                    <div class="input-group">
                        <label class="input-label"><i class="fas fa-signature"></i> FIRMA DIGITAL</label>
                        <div class="signature-container">
                            <canvas id="signaturePad" class="signature-pad"></canvas>
                            <div class="signature-hint">
                                <i class="fas fa-mouse-pointer"></i> Dibuje su firma dentro del recuadro
                            </div>
                        </div>
                    </div>
                    <div class="btn-group-modern">
                        <button type="submit" class="btn btn-primary" id="submitBtn">
                            <i class="fas fa-save"></i> Guardar firma
                        </button>
                        <button type="button" class="btn btn-secondary" id="clearBtn">
                            <i class="fas fa-eraser"></i> Limpiar
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Lista de alumnos con preview mejorado -->
        <div class="glass-card">
            <div class="card-header-modern">
                <h2><i class="fas fa-users-viewfinder"></i> Alumnos registrados</h2>
                <span id="counterBadge" style="background:#eef2ff; padding:4px 12px; border-radius:40px; font-size:0.75rem; font-weight:600;">0</span>
            </div>
            <div class="card-body-modern">
                <div class="toolbar-modern">
                    <button class="btn btn-outline" id="refreshBtn"><i class="fas fa-rotate-right"></i> Actualizar</button>
                    <button class="btn btn-success" id="exportBtn"><i class="fas fa-file-pdf"></i> Exportar PDF</button>
                </div>
                <div id="studentsList">
                    <div class="empty-state-premium">
                        <i class="fas fa-file-signature" style="font-size: 48px; color:#cbd5e1; margin-bottom: 16px; display:block;"></i>
                        <p style="color:#5b6e8c;">Cargando lista de participantes...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="footer">
        <i class="fas fa-laptop-signature"></i> Sistema de validación de firmas · Datos almacenados en la nube
    </div>
</div>

<script>
    // ========== CONFIGURACIÓN SUPABASE ==========
    const SUPABASE_URL = 'https://uhryalhhypfopsxbfttr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVocnlhbGhoeXBmb3BzeGJmdHRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4NjAxMjYsImV4cCI6MjA4NjQzNjEyNn0.QgDfttGQg_iSaiHAd5J9R0YfEh_aaSodo0_DJyZQA1Q';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ========== CANVAS FIRMA PROFESIONAL ==========
    const canvas = document.getElementById('signaturePad');
    let ctx = canvas.getContext('2d');
    let drawing = false;
    let lastX = 0, lastY = 0;

    function resizeCanvasPro() {
        const container = canvas.parentElement;
        const containerWidth = container.clientWidth - 4; // margen interno
        canvas.width = containerWidth;
        canvas.height = 210;
        // restaurar estilo después del resize
        if (ctx) {
            ctx.strokeStyle = '#1e2b6e';
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
    }
    window.addEventListener('resize', () => resizeCanvasPro());
    resizeCanvasPro();

    function initCanvasContext() {
        ctx.strokeStyle = '#1e2b6e';
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    initCanvasContext();

    function getCanvasCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        let x = (clientX - rect.left) * scaleX;
        let y = (clientY - rect.top) * scaleY;
        x = Math.min(Math.max(0, x), canvas.width);
        y = Math.min(Math.max(0, y), canvas.height);
        return { x, y };
    }

    function startDraw(e) {
        e.preventDefault();
        drawing = true;
        const pos = getCanvasCoords(e);
        lastX = pos.x;
        lastY = pos.y;
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
    }

    function drawMove(e) {
        e.preventDefault();
        if (!drawing) return;
        const pos = getCanvasCoords(e);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        lastX = pos.x;
        lastY = pos.y;
    }

    function endDraw() {
        drawing = false;
        ctx.beginPath();
    }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', drawMove);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);
    canvas.addEventListener('touchstart', startDraw);
    canvas.addEventListener('touchmove', drawMove);
    canvas.addEventListener('touchend', endDraw);

    document.getElementById('clearBtn').addEventListener('click', () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        initCanvasContext();
    });

    // ========== FUNCIONES CRUD ==========
    async function loadAlumnos() {
        try {
            const { data, error } = await supabase
                .from('alumnos')
                .select('*')
                .order('fecha_registro', { ascending: false });
            if (error) throw error;
            renderStudentCards(data || []);
            document.getElementById('counterBadge').innerText = data?.length || 0;
        } catch (err) {
            console.error(err);
            renderStudentCards([]);
            document.getElementById('counterBadge').innerText = '0';
        }
    }

    function renderStudentCards(students) {
        const container = document.getElementById('studentsList');
        if (!students.length) {
            container.innerHTML = `
                <div class="empty-state-premium">
                    <i class="fas fa-user-slash" style="font-size: 48px; color:#cbd5e1;"></i>
                    <p style="margin-top:12px;">Aún no hay firmas registradas</p>
                    <p style="font-size:12px;">Complete el formulario para agregar un alumno</p>
                </div>`;
            return;
        }
        let html = `<div class="students-grid-premium">`;
        students.forEach(alumno => {
            const fechaObj = new Date(alumno.fecha_registro);
            const fechaFormateada = fechaObj.toLocaleString('es-PE', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute:'2-digit' });
            html += `
                <div class="student-card-premium">
                    <div class="student-name-premium">
                        <i class="fas fa-user-circle"></i> ${escapeHtml(alumno.nombre_completo)}
                    </div>
                    <div class="student-date-premium">
                        <i class="far fa-calendar-alt"></i> ${fechaFormateada}
                    </div>
                    <div class="signature-preview">
                        <span class="badge-firma"><i class="fas fa-pen"></i> Firma adjunta</span>
                        <img src="${alumno.firma_data}" alt="firma" style="max-height:42px; max-width:140px;">
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        container.innerHTML = html;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function saveStudentToSupabase(name, signatureDataURL) {
        try {
            const { error } = await supabase
                .from('alumnos')
                .insert([{
                    nombre_completo: name.toUpperCase().trim(),
                    firma_data: signatureDataURL,
                    fecha_registro: new Date().toISOString()
                }]);
            if (error) throw error;
            return true;
        } catch (err) {
            console.error('Supabase insert error:', err);
            return false;
        }
    }

    function isCanvasBlank() {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
            if (data[i] < 250 || data[i+1] < 250 || data[i+2] < 250) return false;
        }
        return true;
    }

    // ========== PDF EXPORT MEJORADO ==========
    async function exportPremiumPDF() {
        try {
            const { data: students, error } = await supabase
                .from('alumnos')
                .select('*')
                .order('fecha_registro', { ascending: false });
            if (error) throw error;
            if (!students || students.length === 0) {
                alert('No hay registros para exportar.');
                return;
            }
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
            
            // Encabezado institucional
            pdf.setFillColor(30, 43, 110);
            pdf.rect(0, 0, 210, 38, 'F');
            pdf.setTextColor(255, 255, 255);
            pdf.setFontSize(18);
            pdf.setFont('helvetica', 'bold');
            pdf.text('Instituto Carrión', 105, 18, { align: 'center' });
            pdf.setFontSize(11);
            pdf.setFont('helvetica', 'normal');
            pdf.text('Solicitud de Firmas para Presenciales del Curso', 105, 28, { align: 'center' });
            pdf.setTextColor(80, 80, 80);
            pdf.setFontSize(9);
            pdf.text(`Generado: ${new Date().toLocaleDateString('es-PE')} - Lima, Perú`, 105, 45, { align: 'center' });
            
            let y = 58;
            pdf.setDrawColor(200, 200, 220);
            pdf.line(20, y-2, 190, y-2);
            
            for (let i = 0; i < students.length; i++) {
                const s = students[i];
                if (y > 270) {
                    pdf.addPage();
                    y = 30;
                    pdf.setFillColor(30, 43, 110);
                    pdf.rect(0, 0, 210, 30, 'F');
                    pdf.setTextColor(255,255,255);
                    pdf.text('Instituto Carrión - Reporte de Firmas', 105, 18, { align: 'center' });
                    pdf.setTextColor(80,80,80);
                    y = 45;
                }
                pdf.setFontSize(10);
                pdf.setFont('helvetica', 'bold');
                pdf.setTextColor(20, 30, 60);
                pdf.text(`${i+1}. ${s.nombre_completo}`, 20, y);
                y += 6;
                pdf.setFontSize(8);
                pdf.setFont('helvetica', 'normal');
                pdf.setTextColor(100, 100, 120);
                const fechaReg = new Date(s.fecha_registro).toLocaleString('es-PE');
                pdf.text(`Registro: ${fechaReg}`, 25, y);
                y += 5;
                pdf.setTextColor(50, 70, 110);
                pdf.text('Firma:', 25, y);
                try {
                    const imgData = s.firma_data;
                    if (imgData && imgData.startsWith('data:image')) {
                        pdf.addImage(imgData, 'PNG', 45, y-4, 50, 8);
                    } else {
                        pdf.text('(firma no disponible)', 45, y);
                    }
                } catch (e) { pdf.text('(error al cargar firma)', 45, y); }
                y += 14;
                pdf.setDrawColor(220, 225, 240);
                pdf.line(20, y-2, 190, y-2);
            }
            pdf.save(`Firmas_Instituto_Carrion_${new Date().toISOString().slice(0,19)}.pdf`);
        } catch (err) {
            console.error(err);
            alert('Error al generar el PDF profesional');
        }
    }

    // ========== EVENTOS PRINCIPALES ==========
    document.getElementById('signatureForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fullName = document.getElementById('fullName').value.trim();
        if (!fullName) {
            alert('Por favor, ingrese el nombre completo del alumno.');
            return;
        }
        if (isCanvasBlank()) {
            alert('Debe dibujar la firma en el área designada.');
            return;
        }
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="loading-spinner"></span> Guardando...';
        
        const signatureData = canvas.toDataURL('image/png');
        const success = await saveStudentToSupabase(fullName, signatureData);
        
        if (success) {
            document.getElementById('fullName').value = '';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            initCanvasContext();
            await loadAlumnos();
            alert('✓ Firma registrada correctamente');
        } else {
            alert('✗ Error al guardar. Verifique la conexión con Supabase o permisos de la tabla.');
        }
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-save"></i> Guardar firma';
    });
    
    document.getElementById('refreshBtn').addEventListener('click', () => {
        loadAlumnos();
    });
    
    document.getElementById('exportBtn').addEventListener('click', () => {
        exportPremiumPDF();
    });
    
    // Carga inicial
    loadAlumnos();
</script>
</body>
</html>
